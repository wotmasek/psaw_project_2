<!-- Top Navigation Bar -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-[#f4faff] dark:bg-slate-900/90 backdrop-blur-md">
<div class="flex items-center gap-4">

</header>
<!-- Main Content Canvas -->
<main class="min-h-screen pt-24 pb-32 px-6 max-w-md mx-auto flex flex-col">
<!-- Header Section -->
<section class="mb-10 text-left">
<h2 class="font-headline text-3xl font-extrabold text-on-surface mb-4 leading-tight">
                Anonimowa przestrzeń
            </h2>
<p class="text-on-surface-variant text-lg leading-relaxed">
                Opisz to, co czujesz. Bez oceniania, bez zbędnych pytań. Jesteśmy tu, by Cię wysłuchać.
            </p>
</section>
<!-- Form Area -->
<div class="flex-grow flex flex-col gap-8">
<!-- Anonymous Box -->
<div class="relative group">
<div class="absolute inset-0 bg-primary-container/20 rounded-3xl blur-2xl -z-10 opacity-0 group-focus-within:opacity-100 transition-opacity duration-500"></div>
<div class="bg-surface-container-lowest rounded-3xl p-1 shadow-sm">
<textarea class="w-full min-h-[320px] bg-transparent border-none focus:ring-0 text-on-surface text-lg leading-relaxed placeholder:text-outline/40 p-6 font-body" placeholder="Napisz tutaj o swojej sytuacji..."></textarea>
</div>
</div>
<!-- Reassurance Note -->
<div class="flex items-start gap-4 p-5 bg-tertiary-container/30 rounded-2xl border border-tertiary-fixed-dim/20">
<span class="material-symbols-outlined text-primary mt-0.5" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<p class="text-on-tertiary-fixed-variant text-sm font-medium leading-normal">

                </p>
</div>
</div>
<!-- Sticky Action Button (at bottom of scroll or fixed if screen small) -->
<div class="mt-auto pt-10">
<button class="w-full h-16 rounded-2xl bg-gradient-to-br from-[#1b6d24] to-[#a3f69c] text-[#e5ffdd] font-headline font-bold text-lg flex items-center justify-center gap-3 shadow-[0_12_32px_rgba(27,109,36,0.15)] hover:brightness-105 active:scale-95 transition-all duration-300">
