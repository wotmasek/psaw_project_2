<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
        }

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-surface font-body selection:bg-primary-container">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-[#f4faff] dark:bg-slate-900/90 backdrop-blur-md">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-[#d9f2ff] transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined text-[#1b6d24]">arrow_back</span>
</button>
<h1 class="font-headline font-bold text-lg tracking-tight text-[#003749]">Edytuj Centrum Pomocy</h1>
</div>
<div class="flex items-center">
<span class="text-[#003749] font-extrabold tracking-tighter">dlaczegozyc.pl</span>
</div>
<div class="absolute bottom-0 left-0 bg-[#e7f6ff] h-[1px] w-full"></div>
</header>
<main class="pt-20 pb-32 px-4 max-w-lg mx-auto">
<!-- Intro Section -->
<section class="mb-8 px-2">
<h2 class="font-headline text-2xl font-extrabold text-on-surface mb-2">Zarządzaj Zasobami</h2>
<p class="text-on-surface-variant text-sm leading-relaxed">Aktualizuj kategorie pomocy, opisy oraz numery kontaktowe linii wsparcia dostępnych dla użytkowników.</p>
</section>
<!-- Category Editor Loop -->
<div class="space-y-6">
<!-- Category Card 1 -->
<div class="bg-surface-container-lowest rounded-xl p-5 shadow-sm">
<div class="flex items-center justify-between mb-6">
<span class="text-xs font-bold uppercase tracking-widest text-outline">Kategoria 01</span>
<button class="text-error flex items-center gap-1 text-sm font-semibold hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-sm">delete</span>
                        Usuń kategorię
                    </button>
</div>
<div class="space-y-5">
<!-- Category Title -->
<div class="space-y-1.5">
<label class="text-xs font-bold text-on-surface-variant ml-1">Tytuł Kategorii</label>
<input class="w-full bg-surface-container-low border-0 focus:ring-2 focus:ring-primary rounded-lg px-4 py-3 text-on-surface font-medium placeholder:text-outline-variant/50 transition-all" type="text" value="Wsparcie Kryzysowe"/>
</div>
<!-- Resource Description -->
<div class="space-y-1.5">
<label class="text-xs font-bold text-on-surface-variant ml-1">Opis Zasobów</label>
<textarea class="w-full bg-surface-container-low border-0 focus:ring-2 focus:ring-primary rounded-lg px-4 py-3 text-on-surface text-sm leading-relaxed transition-all" rows="3">Darmowa, całodobowa pomoc telefoniczna dla osób w kryzysie emocjonalnym oraz ich bliskich.</textarea>
</div>
<!-- Crisis Contact Info -->
<div class="space-y-1.5">
<label class="text-xs font-bold text-on-surface-variant ml-1">Informacje Kontaktowe (Telefon/URL)</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-sm">call</span>
<input class="w-full bg-surface-container-low border-0 focus:ring-2 focus:ring-primary rounded-lg pl-10 pr-4 py-3 text-on-surface font-mono font-bold transition-all" type="text" value="116 123"/>
</div>
</div>
</div>
</div>
<!-- Category Card 2 -->
<div class="bg-surface-container-lowest rounded-xl p-5 shadow-sm border-l-4 border-primary-container">
<div class="flex items-center justify-between mb-6">
<span class="text-xs font-bold uppercase tracking-widest text-outline">Kategoria 02</span>
<button class="text-error flex items-center gap-1 text-sm font-semibold">
<span class="material-symbols-outlined text-sm">delete</span>
                        Usuń kategorię
                    </button>
</div>
<div class="space-y-5">
<div class="space-y-1.5">
<label class="text-xs font-bold text-on-surface-variant ml-1">Tytuł Kategorii</label>
<input class="w-full bg-surface-container-low border-0 focus:ring-2 focus:ring-primary rounded-lg px-4 py-3 text-on-surface font-medium transition-all" type="text" value="Pomoc dla Młodzieży"/>
</div>
<div class="space-y-1.5">
<label class="text-xs font-bold text-on-surface-variant ml-1">Opis Zasobów</label>
<textarea class="w-full bg-surface-container-low border-0 focus:ring-2 focus:ring-primary rounded-lg px-4 py-3 text-on-surface text-sm leading-relaxed transition-all" rows="3">Wsparcie dla dzieci i młodzieży borykających się z trudnościami w szkole lub domu.</textarea>
</div>
<div class="space-y-1.5">
<label class="text-xs font-bold text-on-surface-variant ml-1">Informacje Kontaktowe</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-sm">chat_bubble</span>
<input class="w-full bg-surface-container-low border-0 focus:ring-2 focus:ring-primary rounded-lg pl-10 pr-4 py-3 text-on-surface font-mono font-bold transition-all" type="text" value="116 111"/>
</div>
</div>
</div>
</div>
<!-- Add Category Action -->
<button class="w-full py-4 rounded-xl border-2 border-dashed border-outline-variant/30 flex items-center justify-center gap-2 text-on-surface-variant hover:bg-surface-container-low transition-all active:scale-[0.98]">
<span class="material-symbols-outlined">add_circle</span>
<span class="font-bold">Dodaj nową kategorię</span>
</button>
</div>
<!-- Sticky Footer Actions -->
<div class="fixed bottom-0 left-0 w-full bg-[#f4faff]/80 backdrop-blur-xl border-t border-[#86b9d2]/20 px-4 pb-8 pt-4 z-50">
<div class="max-w-lg mx-auto grid grid-cols-2 gap-3">
<button class="py-4 px-6 rounded-2xl bg-surface-container text-on-surface font-bold hover:bg-surface-container-high transition-colors active:scale-95 duration-150">
                    Anuluj
                </button>
<button class="py-4 px-6 rounded-2xl bg-gradient-to-br from-[#1b6d24] to-[#a3f69c] text-white font-bold shadow-lg shadow-primary/20 hover:primary-dim transition-all active:scale-95 duration-150">
                    Zapisz zmiany
                </button>
</div>
</div>
</main>
<!-- Visual Anchor Decorations -->
<div class="fixed top-24 -right-12 w-48 h-48 bg-primary-container/10 rounded-full blur-3xl pointer-events-none -z-10"></div>
<div class="fixed bottom-40 -left-12 w-48 h-48 bg-tertiary-container/20 rounded-full blur-3xl pointer-events-none -z-10"></div>
</body></html>
