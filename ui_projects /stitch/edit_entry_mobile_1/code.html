<!DOCTYPE html>

<html class="light" lang="pl"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "tertiary-fixed-dim": "#d9e6da",
              "secondary-fixed": "#d6e5ef",
              "on-background": "#003749",
              "primary-fixed": "#a3f69c",
              "inverse-primary": "#9df197",
              "tertiary-fixed": "#e7f4e8",
              "outline": "#4e8198",
              "on-secondary-fixed-variant": "#4f5d67",
              "inverse-surface": "#011017",
              "primary-fixed-dim": "#95e88f",
              "error-dim": "#5c1202",
              "surface-tint": "#1b6d24",
              "on-tertiary-container": "#515d54",
              "on-error": "#fff7f6",
              "on-surface": "#003749",
              "primary-container": "#a3f69c",
              "on-tertiary-fixed": "#3f4b42",
              "surface-container": "#d9f2ff",
              "on-primary-container": "#065f18",
              "surface-container-highest": "#bde9ff",
              "background": "#f4faff",
              "surface-container-low": "#e7f6ff",
              "tertiary-container": "#e7f4e8",
              "secondary-dim": "#47555e",
              "surface": "#f4faff",
              "tertiary-dim": "#4a564d",
              "on-tertiary-fixed-variant": "#5b675e",
              "secondary": "#53616a",
              "surface-bright": "#f4faff",
              "tertiary": "#566259",
              "surface-dim": "#a7e2ff",
              "on-error-container": "#742410",
              "inverse-on-surface": "#8f9fa9",
              "primary-dim": "#076019",
              "on-secondary": "#f4faff",
              "on-secondary-fixed": "#33414a",
              "on-tertiary": "#effcf0",
              "error-container": "#fe8b70",
              "on-secondary-container": "#46545d",
              "surface-variant": "#bde9ff",
              "on-primary-fixed-variant": "#176a21",
              "secondary-fixed-dim": "#c8d6e1",
              "on-primary-fixed": "#004b0f",
              "on-primary": "#e5ffdd",
              "secondary-container": "#d6e5ef",
              "outline-variant": "#86b9d2",
              "primary": "#1b6d24",
              "error": "#9e422c",
              "on-surface-variant": "#30657b",
              "surface-container-lowest": "#ffffff",
              "surface-container-high": "#cbedff"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "1rem", "xl": "1.25rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .bg-signature-gradient {
        background: linear-gradient(135deg, #1b6d24 0%, #a3f69c 100%);
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-[#f4faff] dark:bg-slate-900/90 backdrop-blur-md">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-[#d9f2ff] transition-colors active:scale-95 duration-150 text-[#1b6d24]">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Manrope'] font-bold text-lg tracking-tight text-[#003749]">Edytuj wpis</h1>
</div>
<div class="flex items-center gap-2">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-[#d9f2ff] transition-colors active:scale-95 duration-150 text-error">
<span class="material-symbols-outlined" data-icon="delete">delete</span>
</button>
</div>
<div class="absolute bottom-0 left-0 bg-[#e7f6ff] dark:bg-slate-800 h-[1px] w-full self-end"></div>
</header>
<main class="pt-24 pb-32 px-6 max-w-md mx-auto">
<!-- Instructional Header -->
<section class="mb-10">
<h2 class="font-headline text-3xl font-extrabold text-on-surface tracking-tight mb-2">Refleksja dnia</h2>
<p class="text-on-surface-variant leading-relaxed opacity-80">Popraw swoje myśli lub dodaj nowe szczegóły do dzisiejszego zapisu.</p>
</section>
<!-- Edit Form -->
<form class="space-y-8">
<!-- Title Field -->
<div class="space-y-3">
<label class="block text-sm font-semibold tracking-wide text-on-surface-variant px-1" for="entry-title">Tytuł wpisu</label>
<div class="relative group">
<input class="w-full bg-surface-container-low border-none rounded-xl px-5 py-4 text-on-surface placeholder-outline-variant/50 focus:ring-2 focus:ring-primary transition-all duration-300 outline-none" id="entry-title" type="text" value="Spokojny poranek w lesie"/>
<div class="absolute inset-0 rounded-xl border border-outline-variant/20 pointer-events-none group-focus-within:border-transparent"></div>
</div>
</div>
<!-- Visual Context Image (Decorative) -->
<div class="relative w-full h-48 rounded-xl overflow-hidden shadow-sm">
<img class="w-full h-full object-cover" data-alt="Sunlight filtering through dense green forest trees creating soft morning light and calm atmosphere" src="https://lh3.googleusercontent.com/aida-public/AB6AXuA7I7JFNGQF5-PR_wIKMnN5hobfWOQ8qQgW2AJxH_iQ-7heCJsYtdeDdflEcmF6JFtmzr8Go4px9g-ZSrpt9CIDZcmil2UBFDQramDptP8K1BlMc6z7DG_WX6U2yEDSMJ9CWs1o_sTul5PqtiaZF9045F6X07kYCQ9KTveQzQnhtIJKbxxSE2aFgFTcktvRBSrE2H2LWbJLWsbj3h6L1Fdp2_0Am-A0LFM0Kd-99hrh8ivOKbhk-xU2LdJyIPY2Q7bK5WO_eKV3muA"/>
<div class="absolute inset-0 bg-gradient-to-t from-black/20 to-transparent"></div>
<button class="absolute bottom-3 right-3 bg-surface-container-lowest/90 backdrop-blur-md p-2 rounded-lg flex items-center gap-2 text-xs font-bold text-on-surface shadow-md" type="button">
<span class="material-symbols-outlined text-sm" data-icon="edit">edit</span>
                    Zmień zdjęcie
                </button>
</div>
<!-- Description Field -->
<div class="space-y-3">
<label class="block text-sm font-semibold tracking-wide text-on-surface-variant px-1" for="entry-desc">Twoja treść</label>
<div class="relative group">
<textarea class="w-full bg-surface-container-low border-none rounded-xl px-5 py-4 text-on-surface placeholder-outline-variant/50 focus:ring-2 focus:ring-primary transition-all duration-300 outline-none resize-none leading-relaxed" id="entry-desc" rows="8">Dzisiaj poczułem niezwykły spokój spacerując między drzewami. Powietrze było rześkie, a zapach igliwia przypomniał mi o dzieciństwie. To był moment, w którym czas na chwilę zwolnił. Chciałbym zachować to uczucie na dłużej i wracać do niego w trudniejszych chwilach. To przypomnienie, że spokój jest zawsze dostępny, wystarczy go poszukać w naturze.</textarea>
<div class="absolute inset-0 rounded-xl border border-outline-variant/20 pointer-events-none group-focus-within:border-transparent"></div>
</div>
</div>
<!-- Tag Suggestion / Category (Asymmetric Bento Element) -->
<div class="grid grid-cols-2 gap-4">
<div class="bg-tertiary-container p-5 rounded-xl flex flex-col justify-between">
<span class="material-symbols-outlined text-tertiary mb-4" data-icon="mood">mood</span>
<span class="text-xs font-bold uppercase tracking-widest text-on-tertiary-container">Nastrój</span>
<span class="text-sm font-medium text-on-tertiary-container mt-1">Wyciszony</span>
</div>
<div class="bg-secondary-container p-5 rounded-xl flex flex-col justify-between">
<span class="material-symbols-outlined text-secondary mb-4" data-icon="category">category</span>
<span class="text-xs font-bold uppercase tracking-widest text-on-secondary-container">Kategoria</span>
<span class="text-sm font-medium text-on-secondary-container mt-1">Natura</span>
</div>
</div>
</form>
<!-- Form Actions -->
<div class="mt-12 space-y-4">
<button class="w-full bg-signature-gradient text-on-primary py-5 rounded-xl font-headline font-bold text-lg shadow-lg shadow-primary/20 hover:primary-dim transition-all active:scale-95 duration-150">
                Zapisz zmiany
            </button>
<button class="w-full bg-transparent border-2 border-outline-variant/20 text-outline py-4 rounded-xl font-body font-semibold text-base hover:bg-surface-container transition-all active:scale-95 duration-150">
                Anuluj
            </button>
</div>
</main>
<!-- Navigation suppressed for edit mode to focus user task -->
</body></html>
