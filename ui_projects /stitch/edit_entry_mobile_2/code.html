<!DOCTYPE html>

<html class="light" lang="pl"><head>

<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .signature-gradient {
        background: linear-gradient(135deg, #1b6d24 0%, #a3f69c 100%);
      }
      .ghost-border {
        border: 1px solid rgba(134, 185, 210, 0.2);
      }

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface font-body text-on-surface selection:bg-primary-fixed selection:text-on-primary-fixed antialiased">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-[#f4faff] dark:bg-slate-900/90 backdrop-blur-md">
<div class="flex items-center gap-4">
<button class="text-[#1b6d24] dark:text-[#a3f69c] active:scale-95 duration-150 p-2 -ml-2 rounded-full hover:bg-[#d9f2ff] transition-colors">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline font-bold text-lg tracking-tight text-[#003749] dark:text-[#e7f6ff]">Edytuj wpis</h1>
</div>
<button class="text-error font-semibold text-sm px-3 py-1 hover:bg-error-container/10 rounded-lg transition-colors">
            Usuń
        </button>
<!-- Separation Logic -->
<div class="absolute bottom-0 left-0 bg-[#e7f6ff] dark:bg-slate-800 h-[1px] w-full"></div>
</header>
<main class="pt-24 pb-32 px-6 max-w-md mx-auto">
<!-- Hero Section/Visual Anchor -->
<div class="mb-10 text-center">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-tertiary-container mb-4">
<span class="material-symbols-outlined text-primary text-3xl">auto_awesome</span>
</div>
<h2 class="font-headline font-extrabold text-2xl text-on-surface tracking-tight leading-tight">Zmień perspektywę</h2>
<p class="text-on-surface-variant mt-2 text-sm leading-relaxed">Twoje myśli ewoluują. To naturalne, że chcesz je doprecyzować.</p>
</div>
<!-- Form Area -->
<form class="space-y-8">
<!-- Title Field -->
<div class="space-y-2">
<label class="block font-headline font-bold text-sm tracking-wide text-on-surface-variant ml-1">TYTUŁ REFLEKSJI</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 text-on-surface font-medium placeholder:text-outline focus:ring-2 focus:ring-primary transition-all shadow-sm" placeholder="O czym dzisiaj myślisz?" type="text" value="Spacer w lesie kabackim"/>
</div>
</div>
<!-- Content Field -->
<div class="space-y-2">
<label class="block font-headline font-bold text-sm tracking-wide text-on-surface-variant ml-1">TWOJA TREŚĆ</label>
<textarea class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 text-on-surface leading-relaxed placeholder:text-outline focus:ring-2 focus:ring-primary transition-all shadow-sm resize-none" placeholder="Opisz swoje uczucia..." rows="8">Dzisiaj słońce przebijało się przez korony drzew w tak szczególny sposób, że poczułem niesamowity spokój. Zapach mchu i wilgotnej ziemi przypomniał mi, że życie toczy się dalej, niezależnie od moich zmartwień. To był dobry moment na oddech.</textarea>
</div>
<!-- Date/Context Badge -->
<div class="flex items-center gap-2 px-4 py-3 bg-tertiary-fixed-dim/30 rounded-2xl w-fit">
<span class="material-symbols-outlined text-tertiary text-sm">calendar_today</span>
<span class="text-xs font-semibold text-tertiary">Utworzono: 12 Października, 14:30</span>
</div>
</form>
<!-- Dynamic Context Card -->
<div class="mt-12 p-6 bg-surface-container-lowest rounded-2xl shadow-[0_12px_32px_rgba(0,55,73,0.06)] relative overflow-hidden group">
<div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
<span class="material-symbols-outlined text-6xl">lightbulb</span>
</div>
<div class="relative z-10">
<h3 class="font-headline font-bold text-primary text-sm mb-2 uppercase tracking-widest">Wskazówka</h3>
<p class="text-on-surface-variant text-sm leading-relaxed italic">
                    "Nie musisz wszystkiego naprawiać dzisiaj. Wystarczy, że jesteś świadomy swoich postępów."
                </p>
</div>
</div>
</main>
<!-- Fixed Bottom Actions (Contextual replacement for FAB/Nav in focused task) -->
<div class="fixed bottom-0 left-0 w-full bg-[#f4faff]/80 backdrop-blur-xl px-6 py-6 flex gap-4 items-center z-50 shadow-[0_-12px_32px_rgba(0,55,73,0.06)]">
<button class="flex-1 px-6 py-4 rounded-xl font-headline font-bold text-sm bg-surface-container text-on-surface-variant hover:bg-surface-container-high transition-colors active:scale-95 duration-150">
            Anuluj
        </button>
<button class="flex-[2] px-6 py-4 signature-gradient rounded-xl font-headline font-bold text-sm text-on-primary shadow-lg shadow-primary/20 active:scale-95 duration-150">
            Zapisz zmiany
        </button>
</div>
</body></html>
