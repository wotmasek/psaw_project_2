<body class="bg-surface font-body text-on-surface antialiased">
<!-- TopAppBar Shell -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-[#f4faff] dark:bg-slate-900/90 backdrop-blur-md">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-[#d9f2ff] transition-colors text-[#1b6d24]">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-['Manrope'] font-bold text-lg tracking-tight text-[#003749]">Inspiracja</h1>
</div>
<div class="flex items-center gap-2">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-[#d9f2ff] transition-colors text-[#4e8198]">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</div>
<!-- Separation Line -->
<div class="absolute bottom-0 left-0 bg-[#e7f6ff] dark:bg-slate-800 h-[1px] w-full"></div>
</header>
<main class="pt-24 pb-32 px-6 max-w-md mx-auto min-h-screen flex flex-col justify-center">
<!-- Contemplation Canvas -->
<section class="relative space-y-12">
<!-- Metadata Header -->
<div class="space-y-2 text-center">
<span class="inline-block px-3 py-1 bg-tertiary-container text-on-tertiary-container text-[11px] font-semibold tracking-wider uppercase rounded-full">
                    Twoja dzisiejsza myśl
                </span>
<p class="text-outline text-xs font-medium">14 października 2023</p>
</div>
<!-- Main Inspiration Text -->
<div class="relative py-8">
<!-- Decorative Graphic Element (Quiet Sanctuary) -->
<div class="absolute -top-4 -left-4 w-12 h-12 bg-surface-container opacity-40 rounded-full blur-2xl"></div>
<div class="absolute -bottom-8 -right-4 w-24 h-24 bg-primary-container opacity-20 rounded-full blur-3xl"></div>
<blockquote class="relative z-10 text-center">
<span class="material-symbols-outlined text-surface-container-highest text-5xl mb-6 block" data-icon="format_quote">format_quote</span>
<p class="font-headline text-[28px] font-extrabold leading-tight text-on-surface tracking-tight">
                        Nawet najdłuższa podróż zaczyna się od jednego małego kroku, który właśnie robisz.
                    </p>
<footer class="mt-8 text-outline-variant font-medium italic text-sm">
                        — Spokój Wewnętrzny
                    </footer>
</blockquote>
</div>
<!-- Focus Image -->
<div class="rounded-3xl overflow-hidden aspect-[4/3] bg-surface-container-low shadow-sm">
<img alt="Spokojny krajobraz" class="w-full h-full object-cover opacity-80 mix-blend-multiply" data-alt="soft focus of a serene lake at dawn with morning mist and a single ripple on the water surface in calm teal tones" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBm_zGMs1RzfYDINp8UbCGd3W5Zycu2rjR9LLgD-tiyQpLqbdhEMM7Jl-v3XN2h6m_PGkNUUJNViXIAnGLa2u_7KEBQz9QNzccLUpvUOTGM8XBYWE8Kjbt07W2JcpHYO0xN88kNT3LWMmHiO9EncWeiiU8tH77wjck9amOIBkeiknKI9L6h3_IF8nZ4rSqllyjDjB-rYW_Pphhq9QeZ9JQcQ3BUuuocCQzBOiQvorE_TTbyBu-7yR2XkgeRSFnW1ocwnbtRaemRInw"/>
</div>
<!-- Primary Actions -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 px-6 py-4 rounded-xl border border-outline/20 hover:bg-surface-container-low transition-all active:scale-95">
<span class="material-symbols-outlined text-[#4e8198]" data-icon="bookmark">bookmark</span>
<span class="text-sm font-semibold text-on-surface">Zapisz</span>
</button>
<button class="flex items-center justify-center gap-2 px-6 py-4 rounded-xl border border-outline/20 hover:bg-surface-container-low transition-all active:scale-95">
<span class="material-symbols-outlined text-[#4e8198]" data-icon="share">share</span>
<span class="text-sm font-semibold text-on-surface">Udostępnij</span>
</button>
</div>
<!-- Secondary Contextual Action (Edit for authorized) -->
<div class="pt-4 text-center">
<button class="text-outline text-xs font-medium underline underline-offset-4 hover:text-primary transition-colors">
                    Edytuj tę inspirację
                </button>
</div>
</section>
</main>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-[#f4faff]/80 dark:bg-slate-900/80 backdrop-blur-xl shadow-[0_-12px_32px_rgba(0,55,73,0.06)] rounded-t-3xl border-t border-[#86b9d2]/20">

<span class="font-['Inter'] text-[11px] font-medium leading-relaxed">Home</span>
</a>
<a class="flex flex-col items-center justify-center bg-gradient-to-br from-[#1b6d24] to-[#a3f69c] text-white rounded-2xl px-4 py-2 scale-105 transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="auto_awesome" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
<span class="font-['Inter'] text-[11px] font-medium leading-relaxed">Inspiration</span>
</a>

<span class="material-symbols-outlined" data-icon="inventory_2">inventory_2</span>
<span class="font-['Inter'] text-[11px] font-medium leading-relaxed">Box</span>
</a>
<a class="flex flex-col items-center justify-center text-[#4e8198] px-4 py-2 hover:text-[#1b6d24] transition-all duration-300 ease-out" href="#">
<span class="material-symbols-outlined" data-icon="lifeline">line_end</span>
<span class="font-['Inter'] text-[11px] font-medium leading-relaxed">Help</span>
</a>
