<div class="w-full max-w-sm mb-12 text-center">
<div class="inline-flex items-center justify-center w-20 h-20 mb-6 bg-surface-container-low rounded-full overflow-hidden">
<img alt="Mental health sanctuary icon" class="w-full h-full object-cover" data-alt="Abstract soft green and blue shapes suggesting a peaceful landscape or a stylized lotus flower in a serene minimalist style" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC0MhXarjlt124wFBmuHZVNr5xjy9GWZ1_a1r6JlSzr8XOvuMLuyiQaYVd9VFy1OOYeTN8Zvqu48RpPbLUegB9Fj33FeFoGDR7Fatt9Q-ZC8aLHHDCBxkTWtbJNFMvsv-Dx36pHSmVPHOFjvSLZ9oGX4bBBoicELWQapYuYQyMi58v0hbInr-ngQfwA9yL3L0RWqsOeE7Q8EXceARXhRESh9yB9POkALk1PeSRTV0yTllUvBXvgyyhApl-2omGF8Sj4DyslQY4wllo"/>

<p class="font-body text-on-surface-variant text-base">Witaj z powrotem w swoim spokojnym miejscu.</p>
</div>
<!-- Login Form Container -->
<div class="w-full max-w-sm">
<form class="space-y-6">
<!-- Username/Email Field -->
<div class="space-y-2">
<label class="block font-label text-sm font-semibold text-on-surface-variant ml-1" for="login">Login lub email</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">person</span>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary text-on-surface placeholder-outline/60 transition-all outline-none" id="login" name="login" placeholder="Wpisz swój login" type="text"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="block font-label text-sm font-semibold text-on-surface-variant" for="password">Hasło</label>
<a class="text-sm font-medium text-primary hover:text-primary-dim transition-colors" href="#">Zapomniałeś hasła?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline">lock</span>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary text-on-surface placeholder-outline/60 transition-all outline-none" id="password" name="password" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Remember Me (Subtle) -->
<div class="flex items-center px-1">
<input class="w-5 h-5 rounded border-outline-variant/20 bg-surface-container-low text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="ml-3 text-sm text-on-surface-variant" for="remember">Zapamiętaj mnie</label>
</div>
<!-- Submit Button -->
<button class="w-full signature-gradient text-on-primary font-headline font-bold py-4 rounded-xl shadow-[0_12px_32px_rgba(27,109,36,0.15)] active:scale-95 transition-all duration-150 text-lg" type="submit">
                    Zaloguj się
                </button>
</form>
<!-- Social Login Divider -->
<div class="relative my-10 text-center">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/10"></div>
</div>
<span class="relative px-4 text-xs font-semibold text-outline bg-surface uppercase tracking-widest">Lub kontynuuj przez</span>

<div class="flex gap-4 mb-10">

<span class="material-symbols-outlined text-on-surface">ios</span>
</button>

<div class="absolute bottom-[-10%] right-[-10%] w-full h-full rounded-full bg-gradient-to-br from-primary-container to-secondary-container blur-3xl"></div>
