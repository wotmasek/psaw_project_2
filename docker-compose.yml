services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dlaczegozyc-app
    command: sh -c "npm install && npm run dev"
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3000}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:3000}
      SESSION_SECRET: ${SESSION_SECRET:-replace-with-long-random-secret}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-dlaczegozyc.sid}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      SESSION_COOKIE_SAME_SITE: ${SESSION_COOKIE_SAME_SITE:-lax}
      DATABASE_URL: ${DATABASE_URL:-postgresql://dlaczegozyc_app:change-me-postgres-password@db:5432/dlaczegozyc}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-dlaczegozyc}
      POSTGRES_USER: ${POSTGRES_USER:-dlaczegozyc_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres-password}
      ADMIN_SEED_LOGIN: ${ADMIN_SEED_LOGIN:-admin}
      ADMIN_SEED_PASSWORD: ${ADMIN_SEED_PASSWORD:-change-me-admin-password}
      ADMIN_SEED_IS_ACTIVE: ${ADMIN_SEED_IS_ACTIVE:-true}
      SMTP_HOST: smtp
      SMTP_PORT: 1025
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-placeholder-user}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-placeholder-password}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-dlaczegozyc.pl}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@example.local}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      BODY_LIMIT: ${BODY_LIMIT:-100kb}
      TRUST_PROXY: ${TRUST_PROXY:-false}
    volumes:
      - ./:/app
      - app_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy
      smtp:
        condition: service_started

  db:
    image: postgres:16-alpine
    container_name: dlaczegozyc-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dlaczegozyc}
      POSTGRES_USER: ${POSTGRES_USER:-dlaczegozyc_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dlaczegozyc_app} -d ${POSTGRES_DB:-dlaczegozyc}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  smtp:
    image: axllent/mailpit:v1.26
    container_name: dlaczegozyc-smtp
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  app_node_modules:

